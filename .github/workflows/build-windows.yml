name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build EXE with hidden imports
      run: |
        pyinstaller --onefile --windowed --name "X-Twitter-Monitor" --hidden-import=twitscrape --hidden-import=ttkbootstrap main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: X-Twitter-Monitor-Windows
        path: dist/X-Twitter-Monitor.exe
